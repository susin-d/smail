# Dovecot SQL authentication configuration
# Connects to MariaDB for user lookup

driver = mysql
connect = host=mariadb dbname=maas user=maas_user password=MYSQL_PASSWORD_PLACEHOLDER

default_pass_scheme = BLF-CRYPT

# Password lookup
password_query = SELECT email AS user, password_hash AS password \
  FROM users WHERE email = '%u' AND is_active = 1

# User lookup
user_query = SELECT \
  CONCAT('/maildata/', SUBSTRING_INDEX('%u', '@', -1), '/', SUBSTRING_INDEX('%u', '@', 1)) AS home, \
  CONCAT('maildir:/maildata/', SUBSTRING_INDEX('%u', '@', -1), '/', SUBSTRING_INDEX('%u', '@', 1), '/Maildir') AS mail, \
  5000 AS uid, \
  5000 AS gid, \
  CONCAT('*:storage=', storage_quota_mb, 'M') AS quota_rule \
  FROM users WHERE email = '%u' AND is_active = 1

# Iterate query (for maintenance)
iterate_query = SELECT email AS user FROM users WHERE is_active = 1
