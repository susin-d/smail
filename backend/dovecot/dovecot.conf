# ─── Dovecot Configuration ───
# Optimized for low memory usage

# ─── Protocols ───
protocols = imap lmtp

# ─── Logging ───
log_path = /dev/stderr
info_log_path = /dev/stderr

# ─── Mail Location ───
mail_location = maildir:/maildata/%d/%n/Maildir
mail_home = /maildata/%d/%n

# ─── Namespaces ───
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Spam {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = no
    special_use = \Archive
  }
}

# ─── Authentication ───
disable_plaintext_auth = no
auth_mechanisms = plain login

passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf
}

userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf
}

# ─── Auth Service (for Postfix SASL) ───
service auth {
  inet_listener {
    port = 12345
  }
}

# ─── LMTP Service (receive from Postfix) ───
service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# ─── IMAP Settings ───
service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  # Disable plain IMAP
  inet_listener imap {
    port = 0
  }
  # Memory optimization
  process_min_avail = 1
  service_count = 0
  vsz_limit = 64M
}

service imap {
  vsz_limit = 128M
}

# ─── SSL/TLS ───
ssl = required
ssl_cert = </etc/letsencrypt/live/mail.susindran.in/fullchain.pem
ssl_key = </etc/letsencrypt/live/mail.susindran.in/privkey.pem
ssl_min_protocol = TLSv1.2

# ─── LDA (Local Delivery Agent) & Sieve ───
protocol lmtp {
  mail_plugins = $mail_plugins sieve
  postmaster_address = postmaster@susindran.in
}

plugin {
  sieve_before = /etc/dovecot/sieve/global/spam.sieve
}

# ─── Performance Tuning ───
login_greeting = smail IMAP ready
mail_max_userip_connections = 10
